name: Aircraft Monitor

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  parse-emails:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-auth google-auth-oauthlib google-api-python-client

      - name: Write Gmail token from secret
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Run email parser
        run: |
          pwd
          python email_parser.py
          ls -la listings_raw.json || echo "listings_raw.json not found"

      - name: Commit updated listings
        run: |
          git config user.name "aircraft-monitor-bot"
          git config user.email "bot@aircraft-monitor"
          git add listings_raw.json || true
          git diff --cached --quiet || git commit -m "update listings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload listings as artifact
        uses: actions/upload-artifact@v4
        with:
          name: listings-${{ github.run_number }}
          path: listings_raw.json
          retention-days: 30
