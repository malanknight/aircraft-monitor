# .github/workflows/aircraft_monitor.yml
#
# Runs the aircraft monitor scrapers and email parser on a schedule.
# Free tier on GitHub Actions: 2,000 minutes/month — this uses ~3 min/run
# at 4x/day = ~360 min/month. Well within limits.
#
# Setup:
#   1. Push this repo to GitHub (can be private)
#   2. Add your Gmail credentials as a GitHub Secret:
#      Settings → Secrets → Actions → New secret
#      Name: GMAIL_TOKEN_JSON
#      Value: paste contents of your token.json file
#   3. The workflow writes listings_raw.json and commits it back to the repo
#      so the dashboard can fetch it as a static JSON file.

name: Aircraft Monitor

on:
  schedule:
    # Runs at 6:00, 12:00, 18:00, and 23:00 UTC every day
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  scrape-and-parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # needed to commit listings_raw.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 geopy \
                      google-auth google-auth-oauthlib google-api-python-client

      - name: Write Gmail token from secret
        run: echo '${{ secrets.GMAIL_TOKEN_JSON }}' > token.json

      - name: Run scrapers (Barnstormers, AOPA, GMAX)
        run: python aircraft_scrapers.py

      - name: Run email parser (Controller, Trade-A-Plane)
        run: python email_parser.py

      - name: Commit updated listings
        run: |
          git config user.name  "aircraft-monitor-bot"
          git config user.email "bot@aircraft-monitor"
          git add listings_raw.json listings_needs_review.json || true
          git diff --cached --quiet || git commit -m "chore: update listings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload listings as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: listings-${{ github.run_number }}
          path: listings_raw.json
          retention-days: 30
